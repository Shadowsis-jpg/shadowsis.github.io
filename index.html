<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAXIMOV MOTORS | Автосалон</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: #0d0d0d; 
            color: #fff;
            -webkit-tap-highlight-color: transparent;
        }

        h1, h2, h3 { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        img { width: 100%; display: block; object-fit: cover; }

        /* --- ШАПКА --- */
        .header {
            padding: 20px 5%;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: #0d0d0d;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .main-logo { font-size: 1.5rem; letter-spacing: 3px; font-weight: 700; }
        .main-logo span { color: #ff3c00; }

        /* --- ФИЛЬТРЫ --- */
        .filters-wrapper {
            position: sticky;
            top: 71px;
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(10px);
            z-index: 90;
            padding: 15px 5%;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .filters {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }
        
        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 4px;
            font-family: 'Manrope', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .filter-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* --- КАТАЛОГ (Адаптивная сетка) --- */
        #catalog-view {
            padding: 30px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding-bottom: 60px;
        }

        .car-card {
            background: #141414;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .car-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-color: rgba(255,255,255,0.2);
        }

        .car-img-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #1a1a1a;
        }
        
        .car-card-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .car-card-title { font-size: 1.3rem; letter-spacing: 1px; margin-bottom: 8px; }
        .car-card-price { font-size: 1.4rem; font-weight: 800; color: #fff; margin-bottom: 15px; }
        
        .car-card-specs {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
            margin-top: auto;
        }
        .car-card-specs span { display: flex; align-items: center; gap: 5px; }

        /* --- ДЕТАЛЬНЫЙ ПРОСМОТР --- */
        #detail-view { display: none; padding-bottom: 60px; }

        .detail-layout {
            display: flex;
            flex-direction: column;
            gap: 30px;
            padding: 0;
        }

        /* На компьютерах делаем две колонки (Фото слева, текст справа) */
        @media (min-width: 900px) {
            #detail-view { padding: 40px 5%; }
            .detail-layout { flex-direction: row; align-items: flex-start; }
            .detail-gallery-section { flex: 1; min-width: 0; position: sticky; top: 90px; }
            .info-section { width: 400px; padding: 0 !important; }
            #catalog-view { gap: 40px; }
        }

        .main-image-container {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #111;
            position: relative;
        }
        .main-image-container img { width: 100%; height: 100%; object-fit: cover; }

        .gallery-thumbs {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 15px 5%;
            scrollbar-width: none;
        }
        @media (min-width: 900px) { .gallery-thumbs { padding: 15px 0; } }

        .thumb {
            width: 100px;
            height: 65px;
            flex-shrink: 0;
            border-radius: 4px;
            overflow: hidden;
            border: 2px solid transparent;
            background: #222;
            opacity: 0.4;
            transition: 0.3s;
            cursor: pointer;
        }
        .thumb:hover { opacity: 0.8; }
        .thumb.active { border-color: #ff3c00; opacity: 1; }
        
        .info-section { padding: 20px 5%; }
        .info-category { font-size: 0.85rem; color: #ff3c00; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .info-title { font-size: 2.2rem; line-height: 1.1; margin-bottom: 15px; }
        .info-price { font-size: 2rem; font-weight: 800; margin-bottom: 25px; }
        
        /* Сетка характеристик */
        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .spec-item {
            background: #141414;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .spec-label { font-size: 0.8rem; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .spec-value { font-size: 1.1rem; font-weight: 600; }

        .info-desc { font-size: 1rem; color: #ccc; line-height: 1.7; margin-bottom: 40px; }
        
        .action-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 20px;
            font-family: 'Oswald';
            font-size: 1.1rem;
            text-transform: uppercase;
            border-radius: 4px;
            width: 100%;
            letter-spacing: 2px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .action-btn:hover { background: #ff3c00; color: #fff; }
        .action-btn:active { transform: scale(0.98); }
        
        img.error { opacity: 0; } 
    </style>
</head>
<body>

    <div class="header" id="main-header">
        <div class="main-logo">MAXIMOV <span>MOTORS</span></div>
    </div>

    <div class="filters-wrapper" id="filters-container">
        <div class="filters">
            <button class="filter-btn active" onclick="filterCatalog('all', this)">В наличии</button>
            <button class="filter-btn" onclick="filterCatalog('premium', this)">Премиум</button>
            <button class="filter-btn" onclick="filterCatalog('sport', this)">Спорткары</button>
            <button class="filter-btn" onclick="filterCatalog('suv', this)">Внедорожники</button>
        </div>
    </div>

    <div id="catalog-view"></div>

    <div id="detail-view">
        <div class="detail-layout">
            <div class="detail-gallery-section">
                <div class="main-image-container">
                    <img id="detail-main-img" src="" alt="Auto" onerror="this.classList.add('error')">
                </div>
                <div class="gallery-thumbs" id="detail-thumbs"></div>
            </div>

            <div class="info-section">
                <div class="info-category" id="detail-category">Категория</div>
                <h1 class="info-title" id="detail-title">Название авто</h1>
                <div class="info-price" id="detail-price">0 ₽</div>
                
                <div class="specs-grid">
                    <div class="spec-item">
                        <div class="spec-label">Год выпуска</div>
                        <div class="spec-value" id="detail-year">2023</div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-label">Двигатель</div>
                        <div class="spec-value" id="detail-engine">4.0 л / Бензин</div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-label">Мощность</div>
                        <div class="spec-value" id="detail-hp">650 л.с.</div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-label">Разгон 0-100</div>
                        <div class="spec-value" id="detail-accel">3.6 с</div>
                    </div>
                </div>

                <p class="info-desc" id="detail-desc">Описание</p>
                <button class="action-btn" id="order-btn">Забронировать авто</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0d0d0d');
        tg.setBackgroundColor('#0d0d0d');

        // База данных дилера (с ценами и ТТХ)
        const carsData = [
            { id: 'car1', category: 'suv', categoryName: 'Внедорожник', title: 'LAMBORGHINI URUS', folder: 'auto/1', price: 35500000, year: 2023, engine: '4.0L V8', hp: 650, accel: '3.6', desc: 'Бескомпромиссный супер-SUV, сочетающий в себе динамику настоящего суперкара и практичность полноразмерного внедорожника. Эксклюзивный матовый окрас кузова, максимальное оснащение карбоновыми элементами и аудиосистема Bang & Olufsen Advanced 3D. Состояние нового автомобиля.' },
            { id: 'car2', category: 'premium', categoryName: 'Представительский класс', title: 'MERCEDES-BENZ S 500 4MATIC', folder: 'auto/2', price: 21900000, year: 2022, engine: '3.0L L6', hp: 435, accel: '4.9', desc: 'Эталон роскоши и технологий. Автомобиль в топовой комплектации с пакетом Executive: раздельные задние кресла с массажем и вентиляцией, экраны для задних пассажиров, премиальная кожа Nappa и система активной подвески E-Active Body Control.' },
            { id: 'car3', category: 'suv', categoryName: 'Кроссовер', title: 'BMW X3 M40i', folder: 'auto/3', price: 9800000, year: 2023, engine: '3.0L L6', hp: 360, accel: '4.9', desc: 'Универсальный и динамичный кроссовер с характером подразделения M Performance. Агрессивный обвес, адаптивная M-подвеска, лазерные фары и спортивные сиденья. Идеальный баланс между комфортом на каждый день и спортивной управляемостью.' },
            { id: 'car4', category: 'premium', categoryName: 'Эксклюзив', title: 'BENTLEY AZURE', folder: 'auto/4', price: 42000000, year: 2008, engine: '6.75L V8', hp: 456, accel: '5.9', desc: 'Коллекционный экземпляр. Настоящая британская классика для ценителей. Кабриолет, созданный вручную в Крю. Безупречное состояние кузова и интерьера из ценных пород дерева и лучшей английской кожи. Автомобиль с прозрачной историей обслуживания.' },
            { id: 'car5', category: 'sport', categoryName: 'Гран-туризмо', title: 'BMW M850i xDRIVE', folder: 'auto/5', price: 15400000, year: 2022, engine: '4.4L V8', hp: 530, accel: '3.7', desc: 'Роскошное спорт-купе, созданное для покорения автобанов. Мощный V8 обеспечивает ураганную динамику, а интеллектуальный полный привод — уверенность в любых условиях. Комплектация включает лазерную оптику, потолок из алькантары и хрустальную отделку элементов управления.' },
            { id: 'car6', category: 'premium', categoryName: 'Бизнес-вэн', title: 'MERCEDES-BENZ V 300 d EXCLUSIVE', folder: 'auto/6', price: 18500000, year: 2023, engine: '2.0L Diesel', hp: 237, accel: '7.8', desc: 'Мобильный офис премиум-класса. Самая богатая комплектация Exclusive с капитанскими креслами, панорамной крышей, акустикой Burmester и холодильником. Идеальный вариант для деловых поездок и комфортных путешествий с семьей.' },
            { id: 'car7', category: 'suv', categoryName: 'Электромобиль', title: 'AVATR 11', folder: 'auto/7', price: 7900000, year: 2023, engine: 'Электро', hp: 578, accel: '3.9', desc: 'Футуристичный кроссовер от Changan, Huawei и CATL. Инновационный дизайн, двери с электроприводом, автопилот нового поколения и впечатляющий запас хода. Интерьер выполнен из премиальных материалов с архитектурным минимализмом.' },
            { id: 'car8', category: 'suv', categoryName: 'Внедорожник', title: 'MERCEDES-AMG G 63', folder: 'auto/8', price: 28500000, year: 2022, engine: '4.0L V8', hp: 585, accel: '4.5', desc: 'Легендарный "Гелендваген" в исполнении AMG. Брутальная внешность, боковой выхлоп с неповторимым звуком V8 и роскошный салон из красной кожи. Автомобиль, не нуждающийся в представлениях, подчеркивающий статус своего владельца.' },
            { id: 'car9', category: 'sport', categoryName: 'Суперкар', title: 'AUDI R8 V10 PERFORMANCE', folder: 'auto/9', price: 24000000, year: 2021, engine: '5.2L V10', hp: 620, accel: '3.1', desc: 'Атмосферный V10, расположенный за сиденьями, полный привод quattro и карбон-керамические тормоза. Настоящий гоночный болид, адаптированный для дорог общего пользования. Безупречная аэродинамика и сумасшедшая динамика.' },
            { id: 'car10', category: 'sport', categoryName: 'Кабриолет', title: 'MINI COOPER S CABRIO', folder: 'auto/10', price: 4200000, year: 2021, engine: '2.0L Turbo', hp: 192, accel: '7.1', desc: 'Стильный городской кабриолет, дарящий эмоции от каждого километра. Отличная управляемость с картинговым характером, яркий экстерьер с полосами на капоте и премиальная отделка салона. Готов к летнему сезону.' }
        ];

        const catalogView = document.getElementById('catalog-view');
        const detailView = document.getElementById('detail-view');
        const filtersContainer = document.getElementById('filters-container');
        
        let currentSelectedCar = null;

        // Форматирование цены (разделение пробелами)
        function formatPrice(price) {
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " ₽";
        }

        // Рендер каталога
        function renderCatalog(filter = 'all') {
            catalogView.innerHTML = '';
            const filteredCars = filter === 'all' ? carsData : carsData.filter(car => car.category === filter);

            filteredCars.forEach(car => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.onclick = () => openCarDetail(car.id);
                
                card.innerHTML = `
                    <div class="car-img-wrapper">
                        <img src="./${car.folder}/1.webp" loading="lazy" alt="${car.title}" onerror="this.classList.add('error')">
                    </div>
                    <div class="car-card-info">
                        <h2 class="car-card-title">${car.title}</h2>
                        <div class="car-card-price">${formatPrice(car.price)}</div>
                        <div class="car-card-specs">
                            <span>📅 ${car.year}</span>
                            <span>⚙️ ${car.hp} л.с.</span>
                        </div>
                    </div>
                `;
                catalogView.appendChild(card);
            });
        }

        // Логика фильтров
        function filterCatalog(category, buttonElement) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            renderCatalog(category);
        }

        // Открытие детальной страницы
        function openCarDetail(id) {
            const car = carsData.find(c => c.id === id);
            if (!car) return;
            currentSelectedCar = car;

            // Заполнение данных
            document.getElementById('detail-title').innerText = car.title;
            document.getElementById('detail-category').innerText = car.categoryName;
            document.getElementById('detail-price').innerText = formatPrice(car.price);
            document.getElementById('detail-year').innerText = car.year;
            document.getElementById('detail-engine').innerText = car.engine;
            document.getElementById('detail-hp').innerText = `${car.hp} л.с.`;
            document.getElementById('detail-accel').innerText = `${car.accel} с`;
            document.getElementById('detail-desc').innerText = car.desc;
            
            const mainImg = document.getElementById('detail-main-img');
            mainImg.classList.remove('error');
            mainImg.src = `./${car.folder}/1.webp`;

            const thumbsContainer = document.getElementById('detail-thumbs');
            thumbsContainer.innerHTML = '';
            
            for (let i = 1; i <= 10; i++) {
                const src = `./${car.folder}/${i}.webp`;
                const thumb = document.createElement('div');
                thumb.className = 'thumb';
                if (i === 1) thumb.classList.add('active');
                
                thumb.innerHTML = `<img src="${src}" loading="lazy" onerror="this.parentElement.style.display='none'">`;
                
                thumb.onclick = () => {
                    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                    mainImg.src = src;
                };
                
                thumbsContainer.appendChild(thumb);
            }

            // Переключение экранов
            catalogView.style.display = 'none';
            filtersContainer.style.display = 'none';
            detailView.style.display = 'block';
            
            window.scrollTo(0, 0);
            tg.BackButton.show();
        }

        // Обработка кнопки "Назад" в Telegram
        tg.BackButton.onClick(() => {
            detailView.style.display = 'none';
            catalogView.style.display = 'grid'; // Возвращаем Grid
            filtersContainer.style.display = 'block';
            tg.BackButton.hide();
        });

        // Кнопка бронирования
        document.getElementById('order-btn').onclick = () => {
            if(currentSelectedCar) {
                // Отправляем ID машины боту. Бот поймает это и пришлет менеджеру.
                tg.sendData(`BOOK_${currentSelectedCar.id}`);
            }
        };

        // Запуск
        renderCatalog();
    </script>
</body>
</html>
